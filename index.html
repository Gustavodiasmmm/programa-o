<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Jovens | YouthHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    
    <header>
      <h1>YouthHub</h1>
      <p>Cadastro para Programa de Jovens</p>
    </header>

    <main>
      <section>
        <article>
          <h2>Preencha seus dados</h2>

          <form id="youthForm" novalidate>
            
            <div class="form-group">
              <label for="nome">Nome completo</label>
              <input type="text" id="nome" name="nome" required aria-describedby="nome-help" placeholder="Digite seu nome completo">
              <small id="nome-help">Mínimo de 3 caracteres</small>
            </div>

            <div class="form-group">
              <label for="idade">Idade</label>
              <input type="number" id="idade" name="idade" required min="14" max="30" aria-describedby="idade-help" placeholder="Digite sua idade">
              <small id="idade-help">Entre 14 e 30 anos</small>
            </div>

            <button type="submit">Cadastrar</button>

            <div id="message" role="alert" aria-live="polite"></div>
          </form>
        </article>
      </section>
    </main>

    <footer>
      &copy; 2026 YouthHub - Todos os direitos reservados
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
